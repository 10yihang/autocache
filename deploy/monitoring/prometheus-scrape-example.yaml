global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "autocache"
    metrics_path: /metrics
    static_configs:
      - targets:
          - 127.0.0.1:9121

  - job_name: "netcut"
    metrics_path: /metrics
    static_configs:
      - targets:
          - 127.0.0.1:9122
