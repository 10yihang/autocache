groups:
  - name: autocache.rules
    rules:
      - alert: AutoCacheHighErrorRate
        expr: sum(rate(autocache_commands_total{status="error"}[5m])) / clamp_min(sum(rate(autocache_commands_total[5m])), 1) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: AutoCache command error rate is high
      - alert: AutoCacheHighP99Latency
        expr: histogram_quantile(0.99, sum(rate(autocache_command_duration_seconds_bucket[5m])) by (le)) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: AutoCache p99 latency exceeded 100ms
      - alert: AutoCacheWarmTierEmptyMigration
        expr: increase(autocache_tiered_migrations_total{direction="down"}[30m]) == 0
        for: 30m
        labels:
          severity: info
        annotations:
          summary: No hot-to-warm migrations observed in the last 30 minutes
